# Build Sphinx HTML and publish to the gh-pages branch (site root).
#
# Trigger manually: Actions → Docs → Run workflow.
#
# After the first successful run, enable GitHub Pages (Settings → Pages):
#   Source: Deploy from a branch → gh-pages → / (root).
#
# Requires: contents: write (default GITHUB_TOKEN when workflow permissions allow).

name: Docs

on:
  # release:
  #   types: [published]
  workflow_dispatch:

concurrency:
  group: publish-docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/sphinx_config/requirements.txt

      - name: Install package and doc dependencies
        run: pip install -e ".[docs]"

      - name: Build HTML docs
        run: make -C docs/sphinx_config html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/_build/html
          enable_jekyll: false
